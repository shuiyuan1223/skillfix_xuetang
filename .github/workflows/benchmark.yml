name: Benchmark

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/prompts/**'
      - 'src/skills/**'
      - 'src/agent/**'
      - 'src/evolution/**'

  workflow_dispatch:
    inputs:
      profile:
        description: 'Benchmark profile'
        required: false
        default: 'quick'
        type: choice
        options:
          - quick
          - full
      version_tag:
        description: 'Version tag for this run'
        required: false
        type: string

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      # Seed benchmark test cases
      - name: Seed test cases
        run: bun ./dist/cli.js eval seed --force
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # Run benchmark on current PR
      - name: Run benchmark
        run: |
          bun ./dist/cli.js eval benchmark \
            --profile ${{ inputs.profile || 'quick' }} \
            --version-tag "${{ inputs.version_tag || github.event.pull_request.head.sha || 'manual' }}" \
            --json > benchmark-result.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # Check for regressions
      - name: Check regression
        id: regression
        run: |
          RESULT=$(bun ./dist/cli.js eval check-regression --json 2>/dev/null || echo '{"hasRegression":false}')
          echo "result=$RESULT" >> $GITHUB_OUTPUT
          echo "$RESULT" | jq -r '.summary'

          HAS_REG=$(echo "$RESULT" | jq -r '.hasRegression')
          if [ "$HAS_REG" = "true" ]; then
            echo "regression=true" >> $GITHUB_OUTPUT
          else
            echo "regression=false" >> $GITHUB_OUTPUT
          fi

      # Comment benchmark results on PR
      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '';

            try {
              const result = JSON.parse(fs.readFileSync('benchmark-result.json', 'utf8'));
              const run = result.run;
              const passed = run.passedCount;
              const failed = run.failedCount;
              const score = run.overallScore;
              const emoji = score >= 80 ? ':white_check_mark:' : score >= 60 ? ':warning:' : ':x:';

              body = `## ${emoji} Benchmark Results\n\n`;
              body += `| Metric | Value |\n|--------|-------|\n`;
              body += `| Overall Score | **${score}/100** |\n`;
              body += `| Passed | ${passed} |\n`;
              body += `| Failed | ${failed} |\n`;
              body += `| Profile | ${run.profile} |\n`;
              body += `| Duration | ${(run.durationMs / 1000).toFixed(1)}s |\n`;
            } catch (e) {
              body = '## Benchmark Results\n\nFailed to parse benchmark results.';
            }

            const regression = '${{ steps.regression.outputs.regression }}';
            if (regression === 'true') {
              body += '\n\n:warning: **Regression detected!** See check details above.';
            }

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Benchmark Results')
            );

            const commentBody = body + '\n\n---\n*Auto-generated by PHA Benchmark CI*';

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody,
              });
            }

      # Fail if regression detected
      - name: Check for regression failure
        if: steps.regression.outputs.regression == 'true'
        run: |
          echo "::error::Benchmark regression detected! Score dropped below threshold."
          exit 1
