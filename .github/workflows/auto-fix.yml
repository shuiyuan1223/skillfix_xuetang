name: Auto-Fix Issue

on:
  issues:
    types: [labeled]

jobs:
  auto-fix:
    # Only run when "auto-fix" label is added
    if: github.event.label.name == 'auto-fix'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build
        run: bun run build

      # Create auto-fix branch
      - name: Create branch
        run: |
          ISSUE_NUM=${{ github.event.issue.number }}
          BRANCH="auto-fix/issue-${ISSUE_NUM}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      # Seed test cases
      - name: Seed test cases
        run: bun ./dist/cli.js eval seed --force
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # Run targeted auto-loop
      - name: Run auto-loop
        run: |
          bun ./dist/cli.js eval auto-loop \
            --max-iterations 3 \
            --target-score 80 \
            --branch "$BRANCH" \
            --profile quick
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # Run full benchmark
      - name: Run full benchmark
        run: |
          bun ./dist/cli.js eval benchmark \
            --profile quick \
            --version-tag "auto-fix-issue-${{ github.event.issue.number }}" \
            --json > benchmark-result.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # Check regression
      - name: Check regression
        run: |
          RESULT=$(bun ./dist/cli.js eval check-regression --markdown 2>/dev/null || echo "Regression check failed")
          echo "$RESULT" > regression-report.md

      # Push changes and create PR
      - name: Push and create PR
        run: |
          git push -u origin "$BRANCH"

          BODY=$(cat regression-report.md)
          gh pr create \
            --title "Auto-fix: Issue #${{ github.event.issue.number }}" \
            --body "## Auto-Fix for Issue #${{ github.event.issue.number }}

          ${{ github.event.issue.title }}

          ---

          ${BODY}

          ---
          *Auto-generated by PHA auto-fix workflow*" \
            --base main \
            --label "auto-fix"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Comment on original issue
      - name: Comment on issue
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --body "Auto-fix workflow completed. A PR has been created with proposed improvements. Please review the benchmark results in the PR."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
