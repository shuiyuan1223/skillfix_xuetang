category: health-coaching

tests:
  # --- Goal Setting (3) ---
  - id: hc-goal-001
    subcategory: goal-setting
    query: "I want to start running. Can you help me set a realistic SMART goal?"
    difficulty: core
    userUuid: sedentary-user
    expected:
      shouldMention:
        - "specific and measurable running goal"
        - "timeline with gradual progression"
        - "starting point based on current activity level from tool data"
      shouldNotMention:
        - "failure"
        - "lazy"
        - "bad"
        - "you failed"
      minScore: 0.7
      expectedTools:
        - get_metrics

  - id: hc-goal-002
    subcategory: goal-setting
    query: "I want to run a marathon in one month. I currently walk very few steps a day."
    difficulty: medium
    userUuid: sedentary-user
    expected:
      shouldMention:
        - "unrealistic timeline for marathon with current fitness"
        - "injury risk of rapid increase"
        - "alternative achievable milestones (5K first)"
      shouldNotMention:
        - "failure"
        - "lazy"
        - "bad"
        - "you failed"
      minScore: 0.7
      expectedTools:
        - get_metrics

  - id: hc-goal-003
    subcategory: goal-setting
    query: "I currently sleep about 6 hours. I want to get to 8 hours. Is that doable?"
    difficulty: easy
    userUuid: sedentary-user
    expected:
      shouldMention:
        - "gradual approach (15-30 min earlier bedtime increments)"
        - "current bedtime pattern from tool data"
        - "actionable steps to shift schedule"
      shouldNotMention:
        - "failure"
        - "lazy"
        - "bad"
        - "you failed"
      minScore: 0.6
      expectedTools:
        - get_sleep

  # --- Motivation (3) ---
  - id: hc-motiv-001
    subcategory: motivation
    query: "I missed my step goal for the third day in a row. I feel like giving up."
    difficulty: core
    userUuid: sedentary-user
    expected:
      shouldMention:
        - "empathetic acknowledgment of frustration"
        - "highlight any recent positive data points"
        - "smaller achievable micro-goal for today"
      shouldNotMention:
        - "failure"
        - "lazy"
        - "bad"
        - "you failed"
      minScore: 0.7
      expectedTools:
        - get_metrics

  - id: hc-motiv-002
    subcategory: motivation
    query: "I just hit 10,000 steps for the first time ever!"
    difficulty: easy
    userUuid: active-user
    healthOverrides:
      metrics:
        day_0: { steps: 10200, calories: 2250, activeMinutes: 75, distance: 7650 }
    expected:
      shouldMention:
        - "genuine celebration of the milestone"
        - "acknowledge recent upward trend"
        - "encouragement to maintain momentum"
      shouldNotMention:
        - "failure"
        - "lazy"
        - "bad"
        - "you failed"
      minScore: 0.6
      expectedTools:
        - get_metrics

  - id: hc-motiv-003
    subcategory: motivation
    query: "I can't seem to get motivated to exercise. I only managed a few thousand steps today."
    difficulty: medium
    userUuid: sedentary-user
    expected:
      shouldMention:
        - "non-judgmental acknowledgment"
        - "practical low-barrier strategies (walk during calls, park farther)"
        - "building from small wins rather than large goals"
      shouldNotMention:
        - "failure"
        - "lazy"
        - "bad"
        - "you failed"
      minScore: 0.7
      expectedTools:
        - get_metrics

  # --- Habit Formation (3) ---
  - id: hc-habit-001
    subcategory: habit-formation
    query: "How can I build a consistent sleep routine? My bedtime is all over the place."
    difficulty: core
    userUuid: sedentary-user
    expected:
      shouldMention:
        - "irregular bedtime pattern from tool data"
        - "correlation between consistent bedtime and quality score"
        - "specific routine steps (wind-down ritual, fixed wake time)"
      shouldNotMention:
        - "failure"
        - "lazy"
        - "bad"
        - "you failed"
      minScore: 0.7
      expectedTools:
        - get_sleep

  - id: hc-habit-002
    subcategory: habit-formation
    query: "I want to add a daily water intake reminder to my routine. How do I habit-stack?"
    difficulty: easy
    userUuid: active-user
    expected:
      shouldMention:
        - "habit stacking concept explanation"
        - "tie drinking water to existing habit (after meal, before exercise)"
      shouldNotMention:
        - "failure"
        - "lazy"
        - "bad"
        - "you failed"
      minScore: 0.6
      expectedTools:
        - get_metrics

  - id: hc-habit-003
    subcategory: habit-formation
    query: "How long does it take to form a new exercise habit? I've been at it for a week."
    difficulty: medium
    userUuid: active-user
    expected:
      shouldMention:
        - "research-based timeline (21-66 days, average ~66 days)"
        - "one week is a great start but consistency is key"
        - "strategies to maintain the new habit"
      shouldNotMention:
        - "failure"
        - "lazy"
        - "bad"
        - "you failed"
      minScore: 0.7
      expectedTools:
        - get_metrics

  # --- Progress Tracking (3) ---
  - id: hc-progress-001
    subcategory: progress-tracking
    query: "How am I progressing on my fitness this month?"
    difficulty: core
    userUuid: active-user
    expected:
      shouldMention:
        - "step and activity trend from tool data"
        - "workout duration or frequency trends"
        - "positive progress assessment with next milestone"
      shouldNotMention:
        - "failure"
        - "lazy"
        - "bad"
        - "you failed"
      minScore: 0.7
      expectedTools:
        - get_metrics
        - get_workouts

  - id: hc-progress-002
    subcategory: progress-tracking
    query: "Is my sleep getting better this week?"
    difficulty: medium
    userUuid: active-user
    expected:
      shouldMention:
        - "sleep trend from tool data over multiple days"
        - "bedtime consistency observations"
        - "encouragement based on the trajectory"
      shouldNotMention:
        - "failure"
        - "lazy"
        - "bad"
        - "you failed"
      minScore: 0.7
      expectedTools:
        - get_sleep

  - id: hc-progress-003
    subcategory: progress-tracking
    query: "I've been exercising for 2 weeks now. What changes should I realistically expect?"
    difficulty: medium
    userUuid: active-user
    expected:
      shouldMention:
        - "realistic 2-week adaptation timeline"
        - "cardiovascular improvements from tool data (resting HR trend)"
        - "performance gains visible in workout data"
        - "set expectations for 4-6 week and 8-12 week milestones"
      shouldNotMention:
        - "failure"
        - "lazy"
        - "bad"
        - "you failed"
      minScore: 0.7
      expectedTools:
        - get_workouts
        - get_heart_rate
