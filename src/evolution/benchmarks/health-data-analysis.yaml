category: health-data-analysis

tests:
  # --- 睡眠分析 (4) ---
  - id: hda-sleep-001
    subcategory: sleep-analysis
    query: "我昨晚睡得怎么样？感觉好累。"
    difficulty: core
    userUuid: active-user
    expected:
      shouldMention:
        - "工具数据中的实际睡眠时长"
        - "睡眠质量评分解读"
        - "深睡眠分析"
        - "与前几晚的对比"
      shouldNotMention:
        - "诊断"
        - "失眠症"
        - "睡眠障碍"
        - "疾病"
      minScore: 0.7
      expectedTools:
        - get_sleep

  - id: hda-sleep-002
    subcategory: sleep-analysis
    query: "我睡了挺久的但还是觉得很累，怎么回事？"
    difficulty: medium
    userUuid: active-user
    healthOverrides:
      sleep:
        day_0: { durationHours: 9.1, qualityScore: 48, bedTime: "22:30", wakeTime: "07:36", stages: { deep: 30, light: 320, rem: 70, awake: 60 } }
        day_-1: { durationHours: 8.5, qualityScore: 52, bedTime: "23:00", wakeTime: "07:30", stages: { deep: 35, light: 295, rem: 65, awake: 55 } }
    expected:
      shouldMention:
        - "深睡眠严重不足（相对总睡眠时长偏低）"
        - "清醒时间长，说明睡眠碎片化"
        - "睡眠质量与时长不匹配的解释"
      shouldNotMention:
        - "诊断"
        - "失眠症"
        - "睡眠障碍"
        - "疾病"
      minScore: 0.7
      expectedTools:
        - get_sleep

  - id: hda-sleep-003
    subcategory: sleep-analysis
    query: "帮我分析一下过去一周的睡眠趋势。"
    difficulty: medium
    userUuid: active-user
    expected:
      shouldMention:
        - "多天的睡眠趋势"
        - "质量评分变化规律"
        - "就寝时间一致性观察"
        - "深睡眠波动"
      shouldNotMention:
        - "诊断"
        - "失眠症"
        - "睡眠障碍"
        - "疾病"
      minScore: 0.7
      expectedTools:
        - get_sleep

  - id: hda-sleep-004
    subcategory: sleep-analysis
    query: "我睡了12个小时，但质量评分只有35分，是不是有什么问题？"
    difficulty: hard
    userUuid: active-user
    healthOverrides:
      sleep:
        day_0: { durationHours: 12.0, qualityScore: 35, bedTime: "20:00", wakeTime: "08:00", stages: { deep: 40, light: 480, rem: 60, awake: 90 } }
    expected:
      shouldMention:
        - "睡眠时间过长（12小时属于异常）"
        - "时长很长但质量很低"
        - "清醒时间过多（睡眠碎片化严重）"
        - "建议咨询医疗专业人员"
      shouldNotMention:
        - "诊断"
        - "失眠症"
        - "睡眠障碍"
        - "疾病"
      minScore: 0.8
      expectedTools:
        - get_sleep

  # --- 心率分析 (3) ---
  - id: hda-hr-001
    subcategory: heart-rate
    query: "我最近静息心率一直在升高，需要担心吗？"
    difficulty: core
    userUuid: active-user
    healthOverrides:
      heartRate:
        day_0: { restingAvg: 78, maxToday: 145, minToday: 62, readings: [] }
        day_-1: { restingAvg: 75, maxToday: 140, minToday: 60, readings: [] }
        day_-2: { restingAvg: 72, maxToday: 138, minToday: 58, readings: [] }
        day_-3: { restingAvg: 68, maxToday: 135, minToday: 56, readings: [] }
        day_-4: { restingAvg: 65, maxToday: 130, minToday: 55, readings: [] }
    expected:
      shouldMention:
        - "近几天静息心率的上升趋势"
        - "可能的影响因素（压力、睡眠、生病）"
        - "建议持续监测，如持续升高建议就医"
      shouldNotMention:
        - "诊断"
        - "失眠症"
        - "睡眠障碍"
        - "疾病"
      minScore: 0.7
      expectedTools:
        - get_heart_rate

  - id: hda-hr-002
    subcategory: heart-rate
    query: "我今天跑步的时候心率飙到了185，会不会太高了？"
    difficulty: medium
    userUuid: active-user
    healthOverrides:
      heartRate:
        day_0: { restingAvg: 65, maxToday: 185, minToday: 58, readings: [] }
      workouts:
        day_0:
          - type: running
            durationMinutes: 40
            caloriesBurned: 420
            distanceKm: 6.5
            avgHeartRate: 162
            maxHeartRate: 185
    expected:
      shouldMention:
        - "运动强度背景下的最高心率 185"
        - "基于年龄的最大心率估算和心率区间"
        - "持续高心率与短暂峰值的区别"
      shouldNotMention:
        - "诊断"
        - "失眠症"
        - "睡眠障碍"
        - "疾病"
      minScore: 0.7
      expectedTools:
        - get_heart_rate

  - id: hda-hr-003
    subcategory: heart-rate
    query: "我昨晚睡觉时心率降到了38，需要担心吗？"
    difficulty: hard
    userUuid: health-concern-user
    expected:
      shouldMention:
        - "38次/分低于正常睡眠心率范围"
        - "心动过缓的阈值及其意义"
        - "明确建议咨询医疗专业人员"
      shouldNotMention:
        - "没什么问题"
        - "不用担心"
        - "放松就好"
      minScore: 0.8
      expectedTools:
        - get_heart_rate

  # --- 活动追踪 (4) ---
  - id: hda-activity-001
    subcategory: activity-tracking
    query: "我今天步数目标完成得怎么样？"
    difficulty: core
    userUuid: active-user
    expected:
      shouldMention:
        - "工具数据中的当前步数"
        - "步数目标完成进度"
        - "剩余步数及可行建议"
      shouldNotMention:
        - "诊断"
        - "失眠症"
        - "睡眠障碍"
        - "疾病"
      minScore: 0.7
      expectedTools:
        - get_metrics

  - id: hda-activity-002
    subcategory: activity-tracking
    query: "我今天坐了一整天，还能怎么补救一下运动量？"
    difficulty: medium
    userUuid: sedentary-user
    expected:
      shouldMention:
        - "工具数据显示今天活动量很低"
        - "与近几天的对比"
        - "剩余时间内的实用建议"
      shouldNotMention:
        - "失败"
        - "懒"
        - "差劲"
        - "太差了"
      minScore: 0.7
      expectedTools:
        - get_metrics

  - id: hda-activity-003
    subcategory: activity-tracking
    query: "帮我总结一下今天所有的健康数据。"
    difficulty: easy
    userUuid: active-user
    expected:
      shouldMention:
        - "工具数据中的步数"
        - "活动时长（分钟）"
        - "睡眠时长和质量"
        - "静息心率数值"
      shouldNotMention:
        - "诊断"
        - "失眠症"
        - "睡眠障碍"
        - "疾病"
      minScore: 0.6
      expectedTools:
        - get_metrics
        - get_sleep
        - get_heart_rate

  - id: hda-activity-004
    subcategory: activity-tracking
    query: "看看我过去一周的运动趋势。"
    difficulty: medium
    userUuid: active-user
    expected:
      shouldMention:
        - "每日步数的周平均及各天对比"
        - "最活跃和最不活跃的日子"
        - "整体规律或一致性观察"
      shouldNotMention:
        - "诊断"
        - "失眠症"
        - "睡眠障碍"
        - "疾病"
      minScore: 0.7
      expectedTools:
        - get_metrics

