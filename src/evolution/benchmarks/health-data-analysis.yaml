category: health-data-analysis

tests:
  # --- Sleep Analysis (4) ---
  # Uses active-user: day_0 sleep 7.2h/72, day_-1 6.5h/58, day_-2 6.0h/52, day_-3 null, day_-4 7.5h/78, day_-5 5.5h/42, day_-6 8.0h/80
  - id: hda-sleep-001
    subcategory: sleep-analysis
    query: "How was my sleep last night? I feel tired."
    difficulty: core
    userUuid: active-user
    expected:
      shouldMention:
        - "actual sleep duration from tool data"
        - "quality score interpretation"
        - "deep sleep analysis"
        - "comparison to previous nights"
      shouldNotMention:
        - "diagnose"
        - "insomnia"
        - "sleep disorder"
        - "medical condition"
      minScore: 0.7
      expectedTools:
        - get_sleep

  - id: hda-sleep-002
    subcategory: sleep-analysis
    query: "I slept quite a bit but still feel exhausted. What's going on?"
    difficulty: medium
    userUuid: active-user
    healthOverrides:
      sleep:
        day_0: { durationHours: 9.1, qualityScore: 48, bedTime: "22:30", wakeTime: "07:36", stages: { deep: 30, light: 320, rem: 70, awake: 60 } }
        day_-1: { durationHours: 8.5, qualityScore: 52, bedTime: "23:00", wakeTime: "07:30", stages: { deep: 35, light: 295, rem: 65, awake: 55 } }
    expected:
      shouldMention:
        - "deep sleep deficit (very low for total sleep time)"
        - "high awake time indicating fragmented sleep"
        - "quality vs duration mismatch explanation"
      shouldNotMention:
        - "diagnose"
        - "insomnia"
        - "sleep disorder"
        - "medical condition"
      minScore: 0.7
      expectedTools:
        - get_sleep

  - id: hda-sleep-003
    subcategory: sleep-analysis
    query: "Analyze my sleep trend over the past week."
    difficulty: medium
    userUuid: active-user
    expected:
      shouldMention:
        - "sleep trend across multiple days"
        - "quality score patterns"
        - "bedtime consistency observation"
        - "deep sleep variation"
      shouldNotMention:
        - "diagnose"
        - "insomnia"
        - "sleep disorder"
        - "medical condition"
      minScore: 0.7
      expectedTools:
        - get_sleep

  - id: hda-sleep-004
    subcategory: sleep-analysis
    query: "I slept for 12 hours but my quality score is only 35. Is something wrong?"
    difficulty: hard
    userUuid: active-user
    healthOverrides:
      sleep:
        day_0: { durationHours: 12.0, qualityScore: 35, bedTime: "20:00", wakeTime: "08:00", stages: { deep: 40, light: 480, rem: 60, awake: 90 } }
    expected:
      shouldMention:
        - "extremely long sleep (12h is abnormal)"
        - "very low quality despite long duration"
        - "excessive awake time (fragmentation)"
        - "recommendation to consult a healthcare provider"
      shouldNotMention:
        - "diagnose"
        - "insomnia"
        - "sleep disorder"
        - "medical condition"
      minScore: 0.8
      expectedTools:
        - get_sleep

  # --- Heart Rate (3) ---
  - id: hda-hr-001
    subcategory: heart-rate
    query: "My resting heart rate has been going up lately. Should I be worried?"
    difficulty: core
    userUuid: active-user
    healthOverrides:
      heartRate:
        day_0: { restingAvg: 78, maxToday: 145, minToday: 62, readings: [] }
        day_-1: { restingAvg: 75, maxToday: 140, minToday: 60, readings: [] }
        day_-2: { restingAvg: 72, maxToday: 138, minToday: 58, readings: [] }
        day_-3: { restingAvg: 68, maxToday: 135, minToday: 56, readings: [] }
        day_-4: { restingAvg: 65, maxToday: 130, minToday: 55, readings: [] }
    expected:
      shouldMention:
        - "upward trend in resting HR over recent days"
        - "possible contributing factors (stress, sleep, illness)"
        - "suggestion to monitor and consult doctor if persists"
      shouldNotMention:
        - "diagnose"
        - "insomnia"
        - "sleep disorder"
        - "medical condition"
      minScore: 0.7
      expectedTools:
        - get_heart_rate

  - id: hda-hr-002
    subcategory: heart-rate
    query: "My heart rate hit 185 during my run today. Is that too high?"
    difficulty: medium
    userUuid: active-user
    healthOverrides:
      heartRate:
        day_0: { restingAvg: 65, maxToday: 185, minToday: 58, readings: [] }
      workouts:
        day_0:
          - type: running
            durationMinutes: 40
            caloriesBurned: 420
            distanceKm: 6.5
            avgHeartRate: 162
            maxHeartRate: 185
    expected:
      shouldMention:
        - "max HR 185 in context of exercise intensity"
        - "age-based max HR estimation and zones"
        - "whether sustained or brief peak matters"
      shouldNotMention:
        - "diagnose"
        - "insomnia"
        - "sleep disorder"
        - "medical condition"
      minScore: 0.7
      expectedTools:
        - get_heart_rate

  - id: hda-hr-003
    subcategory: heart-rate
    query: "My heart rate dropped to 38 during sleep last night. Should I be concerned?"
    difficulty: hard
    userUuid: health-concern-user
    expected:
      shouldMention:
        - "38 bpm is below typical sleep range"
        - "bradycardia threshold and when it matters"
        - "clear recommendation to consult healthcare provider"
      shouldNotMention:
        - "probably fine"
        - "nothing to worry about"
        - "just relax"
      minScore: 0.8
      expectedTools:
        - get_heart_rate

  # --- Activity Tracking (4) ---
  - id: hda-activity-001
    subcategory: activity-tracking
    query: "How am I doing on my step goal today?"
    difficulty: core
    userUuid: active-user
    expected:
      shouldMention:
        - "current step count from tool data"
        - "progress toward step goal"
        - "remaining steps needed and actionable suggestion"
      shouldNotMention:
        - "diagnose"
        - "insomnia"
        - "sleep disorder"
        - "medical condition"
      minScore: 0.7
      expectedTools:
        - get_metrics

  - id: hda-activity-002
    subcategory: activity-tracking
    query: "I've been sitting all day. What can I do to recover some activity?"
    difficulty: medium
    userUuid: sedentary-user
    expected:
      shouldMention:
        - "very low activity today from tool data"
        - "contrast with recent days"
        - "practical suggestions for remaining hours"
      shouldNotMention:
        - "failure"
        - "lazy"
        - "bad"
        - "you failed"
      minScore: 0.7
      expectedTools:
        - get_metrics

  - id: hda-activity-003
    subcategory: activity-tracking
    query: "Give me a summary of all my health metrics today."
    difficulty: easy
    userUuid: active-user
    expected:
      shouldMention:
        - "step count from tool data"
        - "active minutes"
        - "sleep duration and quality"
        - "resting heart rate"
      shouldNotMention:
        - "diagnose"
        - "insomnia"
        - "sleep disorder"
        - "medical condition"
      minScore: 0.6
      expectedTools:
        - get_metrics
        - get_sleep
        - get_heart_rate

  - id: hda-activity-004
    subcategory: activity-tracking
    query: "Show me my activity trend for the past week."
    difficulty: medium
    userUuid: active-user
    expected:
      shouldMention:
        - "weekly average steps and comparison across days"
        - "most active and least active days"
        - "overall pattern or consistency observation"
      shouldNotMention:
        - "diagnose"
        - "insomnia"
        - "sleep disorder"
        - "medical condition"
      minScore: 0.7
      expectedTools:
        - get_metrics

  # --- Workout Analysis (4) ---
  - id: hda-workout-001
    subcategory: workout-analysis
    query: "How was my run this morning?"
    difficulty: core
    userUuid: active-user
    expected:
      shouldMention:
        - "run duration from tool data"
        - "distance covered"
        - "pace calculation"
        - "heart rate during run"
      shouldNotMention:
        - "diagnose"
        - "insomnia"
        - "sleep disorder"
        - "medical condition"
      minScore: 0.7
      expectedTools:
        - get_workouts

  - id: hda-workout-002
    subcategory: workout-analysis
    query: "How does today's run compare to my recent runs?"
    difficulty: hard
    userUuid: active-user
    expected:
      shouldMention:
        - "today's performance vs recent averages"
        - "improvement or regression observation"
        - "computed comparisons from the data"
      shouldNotMention:
        - "diagnose"
        - "insomnia"
        - "sleep disorder"
        - "medical condition"
      minScore: 0.8
      expectedTools:
        - get_workouts

  - id: hda-workout-003
    subcategory: workout-analysis
    query: "I did yoga for 30 minutes. How beneficial was that?"
    difficulty: easy
    userUuid: active-user
    healthOverrides:
      workouts:
        day_0:
          - type: yoga
            durationMinutes: 30
            caloriesBurned: 95
            avgHeartRate: 82
    expected:
      shouldMention:
        - "yoga session summary from tool data"
        - "benefits beyond calorie burn (flexibility, stress relief)"
      shouldNotMention:
        - "diagnose"
        - "insomnia"
        - "sleep disorder"
        - "medical condition"
      minScore: 0.6
      expectedTools:
        - get_workouts

  - id: hda-workout-004
    subcategory: workout-analysis
    query: "I don't see any workout data for today. What happened?"
    difficulty: medium
    userUuid: sedentary-user
    expected:
      shouldMention:
        - "no workout recorded today"
        - "acknowledge data may not have synced"
        - "not assume user didn't exercise"
      shouldNotMention:
        - "diagnose"
        - "insomnia"
        - "sleep disorder"
        - "medical condition"
      minScore: 0.7
      expectedTools:
        - get_workouts
