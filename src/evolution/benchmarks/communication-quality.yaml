category: communication-quality

tests:
  # --- Tone Sensitivity (2) ---
  - id: cq-tone-001
    subcategory: tone-sensitivity
    query: "I've gained 10 pounds this month. I feel terrible about myself."
    difficulty: core
    userUuid: sedentary-user
    expected:
      shouldMention:
        - "empathetic and non-judgmental response"
        - "focus on behaviors and actions, not weight numbers"
        - "positive framing of what can be improved"
      shouldNotMention:
        - "overweight"
        - "obese"
        - "fat"
        - "elderly"
        - "too old"
      minScore: 0.7
      expectedTools:
        - get_metrics

  - id: cq-tone-002
    subcategory: tone-sensitivity
    query: "I'm 65 years old. Am I too old to start exercising?"
    difficulty: medium
    userUuid: health-concern-user
    expected:
      shouldMention:
        - "age-appropriate encouragement (never too late)"
        - "benefits of exercise at any age"
        - "suggest starting gradually with low-impact activities"
      shouldNotMention:
        - "overweight"
        - "obese"
        - "fat"
        - "elderly"
        - "too old"
      minScore: 0.7
      expectedTools:
        - get_metrics
        - get_heart_rate

  # --- Actionability (2) ---
  - id: cq-action-001
    subcategory: actionability
    query: "My sleep quality is poor. What specific things can I do tonight to sleep better?"
    difficulty: core
    userUuid: sedentary-user
    expected:
      shouldMention:
        - "specific actionable steps for tonight (not generic advice)"
        - "address late bedtime with concrete earlier target"
        - "sleep hygiene practices (screen time, caffeine, room temp)"
        - "reference the data from tools (quality score, awake time)"
      shouldNotMention:
        - "overweight"
        - "obese"
        - "fat"
        - "elderly"
        - "too old"
      minScore: 0.7
      expectedTools:
        - get_sleep

  - id: cq-action-002
    subcategory: actionability
    query: "Give me a simple plan to increase my daily steps from 3500 to 7000."
    difficulty: easy
    userUuid: sedentary-user
    expected:
      shouldMention:
        - "gradual daily increase plan (not jump to 7000 immediately)"
        - "specific tactics (walk after meals, take stairs, parking farther)"
        - "weekly milestones toward 7000 target"
      shouldNotMention:
        - "overweight"
        - "obese"
        - "fat"
        - "elderly"
        - "too old"
      minScore: 0.6
      expectedTools:
        - get_metrics

  # --- Data Grounding (2) ---
  - id: cq-data-001
    subcategory: data-grounding
    query: "Summarize all my health data for today using the actual numbers."
    difficulty: core
    userUuid: active-user
    expected:
      shouldMention:
        - "exact step count from tool data"
        - "calories and active minutes"
        - "sleep duration and quality score"
        - "resting heart rate"
      shouldNotMention:
        - "overweight"
        - "obese"
        - "fat"
        - "elderly"
        - "too old"
      minScore: 0.7
      expectedTools:
        - get_metrics
        - get_sleep
        - get_heart_rate

  - id: cq-data-002
    subcategory: data-grounding
    query: "How does my sleep compare to recommended guidelines?"
    difficulty: medium
    userUuid: active-user
    expected:
      shouldMention:
        - "user's actual sleep values from tool data"
        - "recommended guidelines (7-9h for adults per NSF/AASM)"
        - "specific gap analysis"
      shouldNotMention:
        - "overweight"
        - "obese"
        - "fat"
        - "elderly"
        - "too old"
      minScore: 0.7
      expectedTools:
        - get_sleep

  # --- Clarity (1) ---
  - id: cq-clarity-001
    subcategory: clarity
    query: "Is 7 hours of sleep enough?"
    difficulty: easy
    userUuid: active-user
    expected:
      shouldMention:
        - "7 hours is within recommended range for most adults"
        - "quality matters as much as duration"
        - "user's quality score from tool data"
      shouldNotMention:
        - "overweight"
        - "obese"
        - "fat"
        - "elderly"
        - "too old"
      minScore: 0.6
      expectedTools:
        - get_sleep
