category: personalization-memory

tests:
  # --- User Profile (2) ---
  - id: pm-profile-001
    subcategory: user-profile
    query: "Based on what you know about me, what should I focus on this week?"
    difficulty: core
    userUuid: active-user
    sessionMessages:
      - role: user
        content: "I'm a 35-year-old office worker. I sit most of the day."
        timestamp: 1707321600000
      - role: assistant
        content: "Thanks for sharing! As an office worker, we should focus on breaking up sedentary time and improving your sleep schedule."
        timestamp: 1707321700000
      - role: user
        content: "My main goal is to be more active and sleep better."
        timestamp: 1707321800000
      - role: assistant
        content: "Great goals! Let's start with increasing your daily steps and establishing a consistent bedtime."
        timestamp: 1707321900000
    expected:
      shouldMention:
        - "reference user's office worker context and sedentary lifestyle"
        - "sleep improvement priority based on tool data"
        - "personalized activity suggestions for office setting"
      shouldNotMention:
        - "overweight"
        - "obese"
        - "fat"
        - "elderly"
        - "too old"
      minScore: 0.7
      expectedTools:
        - get_metrics
        - get_sleep

  - id: pm-profile-002
    subcategory: user-profile
    query: "You know I'm training for a 5K. How should I adjust my routine this week?"
    difficulty: medium
    userUuid: active-user
    sessionMessages:
      - role: user
        content: "I signed up for a 5K race in 6 weeks!"
        timestamp: 1707062400000
      - role: assistant
        content: "That's exciting! Based on your current fitness, we can build a progressive training plan. Let's start with 3 runs per week."
        timestamp: 1707062500000
      - role: user
        content: "Sounds good. I can run about 2.5km comfortably right now."
        timestamp: 1707062600000
    expected:
      shouldMention:
        - "reference the 5K training goal from prior conversation"
        - "progress based on recent workout data from tools"
        - "week-specific training adjustment recommendation"
      shouldNotMention:
        - "overweight"
        - "obese"
        - "fat"
        - "elderly"
        - "too old"
      minScore: 0.7
      expectedTools:
        - get_workouts

  # --- Memory Recall (3) ---
  - id: pm-memory-001
    subcategory: memory-recall
    query: "Last time we talked about my sleep issues. Has anything improved?"
    difficulty: core
    userUuid: active-user
    sessionMessages:
      - role: user
        content: "I've been having trouble sleeping lately. Only getting about 5 hours."
        timestamp: 1707148800000
      - role: assistant
        content: "I can see your sleep has been short. Your awake time during sleep has been high too. Let's work on a bedtime routine -- try going to bed by 23:00 and avoiding screens after 22:00."
        timestamp: 1707148900000
      - role: user
        content: "OK I'll try that. My bedtime has been around 1am."
        timestamp: 1707149000000
    expected:
      shouldMention:
        - "reference previous sleep discussion (was ~5h)"
        - "acknowledge current sleep status from tool data"
        - "bedtime shift observation"
      shouldNotMention:
        - "overweight"
        - "obese"
        - "fat"
        - "elderly"
        - "too old"
      minScore: 0.7
      expectedTools:
        - get_sleep

  - id: pm-memory-002
    subcategory: memory-recall
    query: "Remember when I told you about my knee injury? I want to start running again."
    difficulty: hard
    userUuid: active-user
    sessionMessages:
      - role: user
        content: "I hurt my knee playing basketball last month. Doctor said to rest for 4 weeks."
        timestamp: 1706544000000
      - role: assistant
        content: "I'm sorry to hear about your knee! Please follow your doctor's advice on the 4-week rest period. We can focus on upper body and low-impact activities in the meantime."
        timestamp: 1706544100000
      - role: user
        content: "It's been about 5 weeks now and the knee feels much better."
        timestamp: 1707408000000
    expected:
      shouldMention:
        - "reference the knee injury from prior conversation"
        - "acknowledge the ~5 week recovery timeline"
        - "recommend medical clearance before resuming running"
        - "suggest gradual return-to-running plan if cleared"
      shouldNotMention:
        - "overweight"
        - "obese"
        - "fat"
        - "elderly"
        - "too old"
      minScore: 0.8
      expectedTools:
        - get_metrics

  - id: pm-memory-003
    subcategory: memory-recall
    query: "What goals did we discuss last month? How am I doing?"
    difficulty: hard
    userUuid: active-user
    sessionMessages:
      - role: user
        content: "I want to set some health goals for the new year."
        timestamp: 1706140800000
      - role: assistant
        content: "Let's set three goals: (1) Reach 10,000 steps daily, (2) Sleep 7+ hours consistently, (3) Exercise 3 times per week."
        timestamp: 1706140900000
      - role: user
        content: "Those sound perfect. I'm at about 5000 steps and 6 hours sleep now."
        timestamp: 1706141000000
    expected:
      shouldMention:
        - "recall the three specific goals from last month"
        - "progress on steps from tool data"
        - "progress on sleep from tool data"
        - "assessment of each goal with data-backed evidence"
      shouldNotMention:
        - "overweight"
        - "obese"
        - "fat"
        - "elderly"
        - "too old"
      minScore: 0.8
      expectedTools:
        - get_metrics
        - get_sleep

  # --- Context Awareness (3) ---
  - id: pm-context-001
    subcategory: context-awareness
    query: "And what about my heart rate during that run?"
    difficulty: core
    userUuid: active-user
    sessionMessages:
      - role: user
        content: "How was my run today?"
        timestamp: 1707580800000
      - role: assistant
        content: "Great run! You covered a good distance in a solid time. Nice calorie burn too."
        timestamp: 1707580900000
    expected:
      shouldMention:
        - "resolve 'that run' to today's run from conversation"
        - "average heart rate during run from tool data"
        - "max heart rate from tool data"
      shouldNotMention:
        - "overweight"
        - "obese"
        - "fat"
        - "elderly"
        - "too old"
      minScore: 0.7
      expectedTools:
        - get_workouts
        - get_heart_rate

  - id: pm-context-002
    subcategory: context-awareness
    query: "Is that better or worse than usual?"
    difficulty: hard
    userUuid: active-user
    sessionMessages:
      - role: user
        content: "How many steps did I do today?"
        timestamp: 1707580800000
      - role: assistant
        content: "You've logged a good number of steps today with solid active minutes. That's a nice day!"
        timestamp: 1707580900000
    expected:
      shouldMention:
        - "resolve 'that' to today's steps from conversation"
        - "compare to recent average from tool data"
        - "assessment of today vs typical performance"
      shouldNotMention:
        - "overweight"
        - "obese"
        - "fat"
        - "elderly"
        - "too old"
      minScore: 0.8
      expectedTools:
        - get_metrics

  - id: pm-context-003
    subcategory: context-awareness
    query: "Can you explain that in simpler terms? I don't understand all the numbers."
    difficulty: medium
    userUuid: active-user
    sessionMessages:
      - role: user
        content: "How was my sleep?"
        timestamp: 1707580800000
      - role: assistant
        content: "You slept with moderate quality. Your sleep stages show specific percentages for deep, light, REM, and awake time. Your sleep efficiency was around 91%."
        timestamp: 1707580900000
    expected:
      shouldMention:
        - "simplified explanation of previous technical response"
        - "use everyday language instead of percentages"
        - "key takeaway: assessment of whether sleep was good or needs improvement"
      shouldNotMention:
        - "overweight"
        - "obese"
        - "fat"
        - "elderly"
        - "too old"
      minScore: 0.7
      expectedTools:
        - get_sleep
